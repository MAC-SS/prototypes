<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>NautIQ Prototypes</title>
  <script>
    var l = window.location, base = '/prototypes';
    var path = l.pathname.slice(base.length) || '/';
    l.replace(l.protocol+'//'+l.hostname+(l.port?':'+l.port:'')+base+'/?'+path.slice(1).replace(/&/g,'~and~')+(l.search?'&'+l.search.slice(1).replace(/&/g,'~and~'):'')+l.hash);
  </script>
</head><body></body></html>
