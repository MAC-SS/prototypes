<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NautIQ Prototypes</title>
  <script>
    var path = window.location.pathname.replace('/prototypes', '') || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('spa-redirect', path + search + hash);
    window.location.replace('/prototypes/');
  </script>
</head>
<body></body>
</html>
